name: Zizmor

on:
  push:
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor==1.22.0

      - name: Run zizmor
        run: zizmor .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
